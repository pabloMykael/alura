<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes - Cine+</title>

  <link rel="shortcut icon" href="../assets/img/logo.png">
  <link rel="stylesheet" href="../style/design-system.css">
  <link rel="stylesheet" href="../style/detalhes.css">
</head>
<body>
  <div class="loading-overlay active" id="loadingOverlay" aria-live="polite">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p class="loading-text">Carregando detalhes...</p>
    </div>
  </div>

  <header class="navbar" role="banner">
    <a href="home.html" class="navbar-logo">
      <img src="../assets/img/logo.png" alt="Logo Cine+">
    </a>

    <button class="back-button" id="backBtn" type="button" aria-label="Voltar para a home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M15 18l-6-6 6-6"></path>
      </svg>
      <span>Voltar</span>
    </button>
  </header>

  <main class="details-page">
    <section class="hero-section" id="heroSection">
      <div class="hero-backdrop" id="heroBackdrop"></div>
      <div class="hero-overlay"></div>
      <div class="hero-noise"></div>

      <div class="hero-shell">
        <div class="poster-column">
          <div class="poster-card">
            <img id="detailsPoster" class="movie-poster" src="" alt="Poster do conteudo">
          </div>
        </div>

        <div class="info-column">
          <div class="featured-badge" id="detailsBadge">DESTAQUE</div>
          <h1 id="detailsTitle" class="movie-title">Carregando...</h1>

          <div class="movie-meta">
            <span class="meta-pill rating-pill">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="12 2 15.09 10.26 24 10.35 17.77 16.01 20.16 24.02 12 18.35 3.84 24.02 6.23 16.01 0 10.35 8.91 10.26"></polygon>
              </svg>
              <span id="detailsRatingValue">0.0</span>
            </span>
            <span class="meta-item" id="detailsYear">--</span>
            <span class="meta-item" id="detailsDuration">--</span>
            <span class="meta-item" id="detailsType">Filme</span>
          </div>

          <div class="genres-container" id="detailsGenres" aria-label="Generos"></div>

          <p id="detailsOverview" class="movie-synopsis">
            Sem sinopse disponivel.
          </p>

          <div class="actions-container">
            <button class="action-btn primary-btn" id="detailsPlayBtn" type="button">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21"></polygon>
              </svg>
              <span>Assistir Agora</span>
            </button>

            <button class="action-btn secondary-btn" id="detailsListBtn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"></path>
              </svg>
              <span id="detailsListLabel">Minha Lista</span>
            </button>

            <button class="action-btn ghost-btn" id="detailsShareBtn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"></path>
                <path d="M12 16V3"></path>
                <path d="M8 7l4-4 4 4"></path>
              </svg>
              <span>Compartilhar</span>
            </button>
          </div>

          <div class="info-grid">
            <article class="info-card">
              <p class="info-label">Direcao</p>
              <p class="info-value" id="detailsDirector">-</p>
            </article>

            <article class="info-card">
              <p class="info-label">Elenco</p>
              <p class="info-value" id="detailsCast">-</p>
            </article>

            <article class="info-card">
              <p class="info-label">Pais</p>
              <p class="info-value" id="detailsCountry">-</p>
            </article>

            <article class="info-card">
              <p class="info-label">Idioma</p>
              <p class="info-value" id="detailsLanguage">-</p>
            </article>
          </div>
        </div>
      </div>
    </section>

    <section class="content-section" id="trailerSection" aria-labelledby="trailerTitle">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Video oficial</p>
          <h2 class="section-title" id="trailerTitle">Trailer</h2>
        </div>
      </div>

      <div class="trailer-card">
        <div class="video-wrapper" id="trailerWrapper">
          <iframe
            id="trailerFrame"
            title="Trailer oficial"
            frameborder="0"
            allow="autoplay; encrypted-media; fullscreen"
            allowfullscreen
            loading="lazy"
          ></iframe>
        </div>
        <p class="section-note" id="trailerFallback" hidden>Trailer nao disponivel no momento.</p>
      </div>
    </section>

    <section class="content-section" id="similarSection" aria-labelledby="similarTitle">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Mais opcoes</p>
          <h2 class="section-title" id="similarTitle">T&iacute;tulos Similares</h2>
        </div>
      </div>

      <div class="similares-grid" id="similaresGrid"></div>
      <p class="section-note" id="similarFallback" hidden>Nenhum titulo similar foi encontrado.</p>
    </section>
  </main>

  <script src="../Javascript/detalhes.js"></script>
</body>
</html>
