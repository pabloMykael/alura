<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Pobreflix</title>

  <link rel="stylesheet" href="/style/login.css">
</head>

<body>

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <!-- LOGIN -->
  <main class="login-container">
    <form class="login-box" id="loginForm">

      <img src="/assets/img/logo.png" class="logo" alt="Logo Cine+">

      <h1>Entrar</h1>

      <input type="email" id="emailInput" placeholder="Email" aria-label="E-mail" required>
      <input type="password" id="passwordInput" placeholder="Senha" aria-label="Senha" required>

      <button type="submit" aria-label="Enviar formulário de login">Entrar</button>

      <p class="info">
        Novo por aqui? <a href="#">Assine agora</a>
      </p>

    </form>
  </main>

  <script src="/Javascript/javascript.js"></script>

</body>
</html>
