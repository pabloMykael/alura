<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style/style.css">
  <title>Cine+</title>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="/assets/img/logo.png" alt="Logo Cine+">
</div>

<main class="profile-selection">
  <header class="header">
    <div class="logo">
      <img src="/assets/img/logo.png" alt="Logo Cine+">
    </div>
    <h1>Quem está assistindo?</h1>
  </header>

  <section class="profiles-section">
    <div class="profiles-list">

      <div class="profile-item">
        <a href="/paginas/home.html" aria-label="Acessar perfil Evelyn" onclick="entrar(this)">
          <div class="profile-avatar">
            <img src="/assets/profile/profile1.jpg" alt="Perfil Evelyn">
          </div>
          <span class="profile-name">Evelyn</span>
        </a>
      </div>

      <div class="profile-item">
        <a href="/paginas/home.html" aria-label="Acessar perfil Pablo" onclick="entrar(this)">
          <div class="profile-avatar">
            <img src="/assets/profile/profile2.png" alt="Perfil Pablo">
          </div>
          <span class="profile-name">Pablo</span>
        </a>
      </div>

      <div class="profile-item add-profile">
        <a href="/paginas/novo-perfil.html" aria-label="Adicionar novo perfil">
          <div class="profile-avatar add">
            <img src="/assets/profile/adicionarPerfil.png" alt="Adicionar perfil">
          </div>
          <span class="profile-name">Adicionar perfil</span>
        </a>
      </div>

    </div>
  </section>
</main>

<div id="transition"></div>
<script src="/Javascript/javascript.js"></script>
</body>
</html>
